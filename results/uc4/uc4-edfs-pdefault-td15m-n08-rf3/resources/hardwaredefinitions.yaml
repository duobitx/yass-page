apiVersion: int.esa.yass/v1
description: |
  Name: OneWeb Gen-1 (Ku-/Ka-band comms satellite)
  Mass: ~150 kg (vs ~1100 kg for Sentinel-2)
  Orbit: ~1200 km altitude, 87.9° inclination, 18 orbital planes × 36 sats
         in the full constellation (we use a sub-sample for UC sweeps).
  OBC class: ARM-grade SoC, much lighter than Sentinel-2's ERC-32.
  Payload: comms relay, not Earth observation — no large image buffers
           so on-board storage is modest.
  Battery / solar: ~5 kWh capacity, ~800 W average charge from panels.
